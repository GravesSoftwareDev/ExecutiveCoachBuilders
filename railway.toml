[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && cd ecb_website && python manage.py collectstatic --noinput"

[deploy]
startCommand = "cd ecb_website && python manage.py migrate --noinput && gunicorn ecb_website.wsgi --bind 0.0.0.0:$PORT --workers 2"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
