<div class="fleet-field {% if field.errors %}has-error{% endif %}">
    <label for="{{ field.id_for_label }}" class="fleet-field-label">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}<p class="fleet-field-hint">{{ field.help_text }}</p>{% endif %}
    {% for error in field.errors %}
    <p class="fleet-field-error"><i class="bi bi-exclamation-circle me-1"></i>{{ error }}</p>
    {% endfor %}
</div>
